<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <title> Invito_al_compleanno_di_Concettina </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start-overlay">
        <button id="btn-start">CLICCA QUI</button>
    </div>

    <audio id="audio-black" src="intro.mp3"></audio>
    <audio id="audio-loading" src="melody.mp3"></audio>
    <audio id="audio-final" src="theme.mp3"></audio>

    <div class="splash">
        <div class="splash-text">CREATED BY<br>LUCIA</div>
    </div>

    <div class="splash-loading">
        <img src="CaricamentoLogo.jpeg" alt="Caricamento">
    </div>

    <div class="main-wrapper">
         <div class="speech-bubble">
        <span class="speech-bubble__text">Sei invitato/a al <br> compleanno di Concettina <br>
        Non mooncare! <br> ❤️🐮 </span>
    </div>

    <div class="star-container">
        <div class="rotating-star">
            <img src="star.webp" alt="Stella Blu">
        </div>
        <div class="star-number">77</div>
    </div>
    </div>

    <div class="main-container">
    </div>

    <script src="script.js"></script>

    <script>
window.addEventListener('load', function() {
    // Lista di tutte le immagini e audio
    const risorse = [
        'star.webp',
        'sfondobello.jpeg',
        'CaricamentoLogo.jpeg',
        'intro.mp3',
        'melody.mp3',
        'theme.mp3'
    ];

    risorse.forEach(function(src) {
        if (src.endsWith('.mp3')) {
            const audio = new Audio();
            audio.src = src;
        } else {
            const img = new Image();
            img.src = src;
        }
    });
    console.log("Precaricamento completato!");

    window.onload = function() {
    setTimeout(function() {
        document.getElementById('splash').style.display = 'none'; }, 1500); // 1.5 secondi di attesa
};
});
</script>
</body>
</html>
